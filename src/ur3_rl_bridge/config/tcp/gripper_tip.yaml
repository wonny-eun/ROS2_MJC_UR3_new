# Tool center point (TCP) for the physical gripping point.
# This transform should point from the robot tool frame to the point you want
# to align with the object's grasp pose.
parent_frame: tool0
child_frame: gripper_tip

translation:
  x: 0.0
  y: 0.0
  z: 0.14

rotation_rpy:
  roll: 0.0
  pitch: 0.0
  yaw: 0.0
