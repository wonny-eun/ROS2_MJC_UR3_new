---
workflow:
  rules:
    # Always run on tagged commits
    - if: $CI_COMMIT_TAG
      when: always
    # Run for merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    # Run for commits to protected/standard development branches
    - if: '$CI_COMMIT_BRANCH == "humble" || $CI_COMMIT_BRANCH == "jazzy" || $CI_COMMIT_BRANCH =~ /.*-devel$/'
      when: always
    - when: never

stages:
  - lint
  - build_and_test

pre-commit-check:
  stage: lint
  image: python:3.10
  before_script:
    - pip install pre-commit
  script:
    - pre-commit install --install-hooks
    - pre-commit run --all-files
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: always
    - if: '$CI_COMMIT_BRANCH == "humble" || $CI_COMMIT_BRANCH == "jazzy" || $CI_COMMIT_BRANCH =~ /.*-devel$/'
      when: always
    - when: never

build_and_test:
  stage: build_and_test
  image:
    name: ${CI_SERVER_HOST}:5005/ci_build/docker_with_nasa_certs:latest
  before_script:
    - docker info
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - echo -e "machine ${CI_SERVER_HOST}\nlogin gitlab-ci-token\npassword ${CI_JOB_TOKEN}" > ~/.netrc
  script:
    - DOCKER_BUILDKIT=1 docker build
        -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
        --load
        --target mujoco_ros
        --file docker/Dockerfile
        .
    - |
      docker run --rm \
      ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG} \
      bash -c "
        colcon test &&
        colcon test-result --verbose
      "
  after_script:
    - docker image rm --force ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG} || true
  tags:
    - dind
