        # Joint waypoint: fastest/stablest for known safe robot postures.
        - name: home_ready
          type: joint
          target: [0.0, -1.57, 1.57, -1.57, -1.57, 0.0]

        # Cartesian waypoint: TCP target solved through MoveIt IK.
        - name: scan_tcp
          type: cartesian
          target_xyz: [0.30, -0.30, 0.20]
          lookat_vector: [0.0, 0.0, -1.0]
          tcp_roll_rad: 0.0

        - name: approach_tcp
          type: cartesian
          target_xyz: [0.30, -0.25, 0.15]
          lookat_vector: [0.0, 0.0, -1.0]
          tcp_roll_rad: 0.0
          
    - name: Stage_approach
      type: joint
      target: [-1.570796326794896, -1.570796326794896, 1.570796326794896, -1.570796326794896, -1.570796326794896, -1.570796326794896]
