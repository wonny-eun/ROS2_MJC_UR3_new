  scan_and_approach:
    - name: home_ready
      type: joint
      target: [0.0, -1.57, 1.57, -1.57, -1.57, 0.0]
      velocity_scaling: 0.2
      acceleration_scaling: 0.2
      delay_after_sec: 1.0

    - name: approach_tcp
      type: cartesian
      cartesian_mode: moveit
      target_xyz: [0.30, -0.30, 0.10]
      lookat_vector: [0.0, 0.0, -1.0]
      tcp_roll_rad: 1.5708
      velocity_scaling: 0.15
      acceleration_scaling: 0.15
      delay_after_sec: 0.5

    # Direct straight TCP path. Use only in clear space; this bypasses full OMPL route planning.
    - name: linear_demo
      type: cartesian
      cartesian_mode: linear
      target_xyz: [0.30, -0.25, 0.10]
      lookat_vector: [0.0, 0.0, -1.0]
      tcp_roll_rad: 1.5708
      max_step_m: 0.005
      min_fraction: 0.95
      velocity_scaling: 0.05
      acceleration_scaling: 0.05
      delay_after_sec: 0.5

    - name: smooth_scan_path
      type: waypoint
      waypoints:
        - target_xyz: [0.30, -0.30, 0.10]
          lookat_vector: [0.0, 0.0, -1.0]
          tcp_roll_rad: 1.5708
        - target_xyz: [0.30, -0.25, 0.10]
          lookat_vector: [0.0, 0.0, -1.0]
          tcp_roll_rad: 1.5708
        - target_xyz: [0.30, -0.35, 0.10]
          lookat_vector: [0.0, 0.0, -1.0]
          tcp_roll_rad: 1.5708
      blending_radius: 0.02
      velocity_scaling: 0.1
      acceleration_scaling: 0.1

  mixed_waypoint_demo:
